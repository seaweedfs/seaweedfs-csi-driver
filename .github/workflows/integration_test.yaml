name: CSI Integration Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -race -count=1

      - name: Integration tests (namespace remount)
        run: sudo go test -tags integration ./pkg/driver/ -v -count=1 -run Integration -timeout 120s

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build CSI driver
        run: |
          go build -o _output/seaweedfs-csi-driver ./cmd/seaweedfs-csi-driver
          go build -o _output/seaweedfs-mount ./cmd/seaweedfs-mount

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: csi-test

      - name: Build and load Docker images
        run: |
          # Build CSI driver image
          docker build -t seaweedfs-csi-driver:test -f cmd/seaweedfs-csi-driver/Dockerfile .
          kind load docker-image seaweedfs-csi-driver:test --name csi-test

          # Build mount service image
          docker build -t seaweedfs-mount:test -f cmd/seaweedfs-mount/Dockerfile .
          kind load docker-image seaweedfs-mount:test --name csi-test

          # Pre-pull and load the SeaweedFS image into kind. Pulling from
          # Docker Hub at deploy time intermittently hits anonymous-pull
          # rate limits, leaving the pod in ImagePullBackOff and timing out
          # the rollout. Retry the docker pull a few times to ride through
          # transient registry hiccups.
          for i in 1 2 3; do
            docker pull chrislusf/seaweedfs:latest && break
            echo "docker pull attempt $i failed, retrying..."
            sleep 10
          done
          kind load docker-image chrislusf/seaweedfs:latest --name csi-test

      - name: Deploy SeaweedFS
        run: |
          # Deploy SeaweedFS using a simple manifest with proper health checks
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: seaweedfs
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: seaweedfs
            namespace: seaweedfs
          spec:
            ports:
              - name: master
                port: 9333
              - name: volume
                port: 8080
              - name: filer
                port: 8888
              - name: filer-grpc
                port: 18888
              - name: s3
                port: 8333
            selector:
              app: seaweedfs
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: seaweedfs
            namespace: seaweedfs
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: seaweedfs
            template:
              metadata:
                labels:
                  app: seaweedfs
              spec:
                containers:
                  - name: seaweedfs
                    image: chrislusf/seaweedfs:latest
                    # Use the image preloaded into kind by the workflow so we
                    # do not re-pull from Docker Hub (anonymous rate limits
                    # have caused ImagePullBackOff in CI).
                    imagePullPolicy: IfNotPresent
                    args:
                      - server
                      - -dir=/data
                      - -s3
                      - -filer
                      - -master.peers=none
                      - -volume.max=10
                      - -master.volumeSizeLimitMB=16
                    ports:
                      - containerPort: 9333
                      - containerPort: 8080
                      - containerPort: 8888
                      - containerPort: 18888
                      - containerPort: 8333
                    # Readiness probe checks filer is responding
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 8888
                      initialDelaySeconds: 15
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 30
                    volumeMounts:
                      - name: data
                        mountPath: /data
                volumes:
                  - name: data
                    emptyDir: {}
          EOF
          
          # Wait for SeaweedFS pod to be ready (readiness probe checks filer port 8888).
          # Use rollout status first so the pod actually exists before kubectl wait
          # queries it — otherwise kubectl wait races kubectl apply and exits with
          # "no matching resources found".
          echo "Waiting for SeaweedFS to be ready..."
          kubectl rollout status deployment/seaweedfs -n seaweedfs --timeout=180s
          kubectl wait --for=condition=ready pod -l app=seaweedfs -n seaweedfs --timeout=180s
          kubectl get pods -n seaweedfs
          
          # Brief additional wait for internal services to stabilize
          sleep 5
          echo "SeaweedFS is ready"

      - name: Deploy CSI Driver
        run: |
          # Deploy CSI driver with test images and correct filer address
          # The seaweedfs-csi.yaml deploys to 'default' namespace
          cat deploy/kubernetes/seaweedfs-csi.yaml | \
            sed 's|chrislusf/seaweedfs-csi-driver:latest|seaweedfs-csi-driver:test|g' | \
            sed 's|chrislusf/seaweedfs-mount:latest|seaweedfs-mount:test|g' | \
            sed 's|SEAWEEDFS_FILER:8888|seaweedfs.seaweedfs.svc.cluster.local:8888|g' | \
            kubectl apply -f -
          
          # Wait for CSI driver pods to be ready (fail fast if they don't start)
          sleep 15
          kubectl wait --for=condition=ready pod -l app=seaweedfs-controller --timeout=120s
          kubectl wait --for=condition=ready pod -l app=seaweedfs-node --timeout=120s
          kubectl wait --for=condition=ready pod -l app=seaweedfs-mount --timeout=120s
          kubectl get pods -l 'app in (seaweedfs-controller,seaweedfs-node,seaweedfs-mount)'

      - name: Create StorageClass and test PVC
        run: |
          # Create StorageClass
          kubectl apply -f - <<EOF
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: seaweedfs-csi
          provisioner: seaweedfs-csi-driver
          volumeBindingMode: Immediate
          reclaimPolicy: Delete
          EOF
          
          # Create test PVC
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: test-pvc
          spec:
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: 1Gi
            storageClassName: seaweedfs-csi
          EOF
          
          # Wait for PVC to be bound
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/test-pvc --timeout=60s || {
            echo "PVC not bound, checking events..."
            kubectl describe pvc test-pvc
            kubectl logs -l app=seaweedfs-controller --tail=50
            exit 1
          }

      - name: Run functional test
        run: |
          # Create a test pod that uses the PVC
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: test-pod
          spec:
            containers:
              - name: test
                image: registry.k8s.io/e2e-test-images/busybox:1.29-4
                command: ["sleep", "3600"]
                volumeMounts:
                  - name: data
                    mountPath: /data
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: test-pvc
          EOF
          
          # Wait for pod to be ready
          kubectl wait --for=condition=ready pod/test-pod --timeout=120s || {
            echo "Pod not ready, checking status..."
            kubectl describe pod test-pod
            kubectl logs -l app=seaweedfs-node --tail=100
            exit 1
          }
          
          # Test write
          kubectl exec test-pod -- sh -c 'echo "Hello SeaweedFS CSI" > /data/test.txt'
          
          # Test read
          kubectl exec test-pod -- cat /data/test.txt | grep "Hello SeaweedFS CSI"
          
          # Test file listing
          kubectl exec test-pod -- ls -la /data/
          
          echo "PASS: Functional test passed"

      - name: Test weed mount crash recovery (issue #261)
        run: |
          # Reproduce the scenario from
          # https://github.com/seaweedfs/seaweedfs-csi-driver/issues/261:
          # weed mount processes exit on their own (e.g. after a filer
          # outage they cannot ride out). Their wait() handler runs
          # kubeMounter.Unmount on the staging path, so by the time the
          # CSI driver's health monitor sweep notices, getMountDevice
          # returns empty for the stale staging path. The recovery
          # must (a) re-stage cleanly and (b) replace the stale FUSE
          # mount inside the pod's container — otherwise the pod is
          # left with "transport endpoint is not connected".
          #
          # This step runs before "Test mount service restart recovery"
          # so it gets a clean test pod state. The mount-service
          # restart test is informational/continue-on-error and may
          # leave the cluster with stale FUSE in containers.

          # Pre-crash sentinel.
          kubectl exec test-pod -- sh -c 'echo "before-crash" > /data/crash_sentinel.txt'
          kubectl exec test-pod -- cat /data/crash_sentinel.txt | grep "before-crash"
          echo "Pre-crash sentinel written."

          # Snapshot CSI node log length so we capture only new lines later.
          CSI_NODE_POD=$(kubectl get pod -l app=seaweedfs-node -o jsonpath='{.items[0].metadata.name}')
          LOG_BASELINE=$(kubectl logs "$CSI_NODE_POD" -c csi-seaweedfs-plugin 2>/dev/null | wc -l)
          echo "CSI node log baseline: $LOG_BASELINE lines"

          # Kill the weed mount child process(es) inside the mount service
          # pod, but not the mount service itself. This is what kvaster
          # observed in production: a transient filer outage causes weed
          # mount to give up and exit, while the mount service stays up.
          MOUNT_POD=$(kubectl get pod -l app=seaweedfs-mount -o jsonpath='{.items[0].metadata.name}')
          echo "Killing weed mount processes inside $MOUNT_POD..."
          kubectl exec "$MOUNT_POD" -- sh -c 'pids=$(pgrep -f "weed .*mount" || true); if [ -n "$pids" ]; then echo "killing pids: $pids"; kill -9 $pids; else echo "no weed mount pids found"; fi'

          # The mount service's wait() handler runs kubeMounter.Unmount
          # 100ms after the process exits, so the staging path will be
          # unmounted host-side within ~1s. Then the next CSI health
          # monitor sweep (default 30s interval) must recover the volume.
          echo "Waiting for health monitor to detect and recover..."
          ATTEMPTS=30
          PASSED=0
          for i in $(seq 1 $ATTEMPTS); do
            # Probe the pod's view of the volume. If the stale FUSE
            # mount is still in place we get ENOTCONN ("transport
            # endpoint is not connected"); a successful read means the
            # container-side mount has been replaced.
            if kubectl exec test-pod -- cat /data/crash_sentinel.txt 2>/dev/null | grep -q "before-crash"; then
              echo "PASS: pod can read sentinel after ~$((i * 5))s — recovery succeeded with no stale FUSE in the container"
              PASSED=1
              break
            fi
            # Periodic diagnostics every 15s.
            if [ $((i % 3)) = 0 ]; then
              echo "--- poll $i: pod view of /data ---"
              kubectl exec test-pod -- ls /data/ 2>&1 | head -5 || true
              echo "--- poll $i: CSI node new log lines ---"
              kubectl logs "$CSI_NODE_POD" -c csi-seaweedfs-plugin 2>/dev/null | tail -n +"$((LOG_BASELINE + 1))" | tail -30
              echo "--- poll $i: fuse mounts in CSI node namespace ---"
              kubectl exec "$CSI_NODE_POD" -c csi-seaweedfs-plugin -- cat /proc/self/mountinfo 2>/dev/null | grep fuse || echo "(no fuse mounts)"
            fi
            sleep 5
          done

          if [ "$PASSED" -ne 1 ]; then
            echo "FAIL: pod could not read sentinel within $((ATTEMPTS * 5))s after weed mount crash"
            echo "--- CSI node full logs (new lines since crash) ---"
            kubectl logs "$CSI_NODE_POD" -c csi-seaweedfs-plugin 2>/dev/null | tail -n +"$((LOG_BASELINE + 1))"
            echo "--- Mount service logs ---"
            kubectl logs -l app=seaweedfs-mount --tail=200
            echo "--- Pod describe ---"
            kubectl describe pod test-pod
            exit 1
          fi

          # Verify writes still work after recovery — confirms the
          # container-side mount really points at a live FUSE, not at
          # an empty bare directory left behind by an aborted recovery.
          kubectl exec test-pod -- sh -c 'echo "after-crash" > /data/post_crash.txt'
          kubectl exec test-pod -- cat /data/post_crash.txt | grep "after-crash"
          echo "PASS: weed mount crash recovery test passed"

      - name: Test mount service restart recovery
        continue-on-error: true
        run: |
          # This test verifies that after the mount service (FUSE daemon)
          # restarts, the CSI driver's health monitor recovers the mount
          # AND fixes stale mounts inside the pod container via setns.
          #
          # NOTE: In kind clusters, the kernel may cache FUSE directory
          # entries so the health monitor sees the staging path as
          # healthy even after the FUSE daemon dies. This makes the test
          # non-deterministic in CI. The core setns remount logic is
          # covered by the Go integration tests (TestIntegrationRemountViaSetns)
          # which run with real namespaces in the unit-test job.
          # continue-on-error is set so this test is informational.

          # Write a sentinel file before the restart.
          kubectl exec test-pod -- sh -c 'echo "before-restart" > /data/sentinel.txt'
          kubectl exec test-pod -- cat /data/sentinel.txt | grep "before-restart"
          echo "Pre-restart sentinel written."

          # Snapshot CSI node log length so we can capture only new lines later.
          CSI_NODE_POD=$(kubectl get pod -l app=seaweedfs-node -o jsonpath='{.items[0].metadata.name}')
          LOG_BASELINE=$(kubectl logs "$CSI_NODE_POD" -c csi-seaweedfs-plugin 2>/dev/null | wc -l)
          echo "CSI node log baseline: $LOG_BASELINE lines"

          # Restart the mount service DaemonSet pod. This kills all
          # weed mount FUSE processes, leaving stale mounts.
          MOUNT_POD=$(kubectl get pod -l app=seaweedfs-mount -o name)
          echo "Deleting mount service pod: $MOUNT_POD"
          kubectl delete $MOUNT_POD --grace-period=0 --force 2>/dev/null || true

          # Wait for the replacement mount service pod to be ready.
          echo "Waiting for mount service pod to come back..."
          sleep 5
          kubectl wait --for=condition=ready pod -l app=seaweedfs-mount --timeout=120s

          # Check whether the FUSE mount actually broke. In some
          # environments (e.g., kind with shared mount propagation),
          # the FUSE mount survives the mount service pod restart
          # because the kernel doesn't sever the FUSE connection
          # when containerd cleans up the container. If the pod can
          # still read data, no recovery is needed -- that's a pass.
          sleep 3
          if kubectl exec test-pod -- cat /data/sentinel.txt 2>/dev/null | grep -q "before-restart"; then
            echo "PASS: FUSE mount survived mount service restart -- no recovery needed"
            kubectl exec test-pod -- sh -c 'echo "after-restart" > /data/post_restart.txt'
            kubectl exec test-pod -- cat /data/post_restart.txt | grep "after-restart"
            echo "PASS: Mount service restart test passed (mount stayed healthy)"
          else
            echo "FUSE mount is stale after restart -- waiting for health monitor recovery (up to 120s)..."
            ATTEMPTS=24
            for i in $(seq 1 $ATTEMPTS); do
              if kubectl exec test-pod -- cat /data/sentinel.txt 2>/dev/null | grep -q "before-restart"; then
                echo "PASS: Mount recovered after ~$((i * 5))s -- pod can still read data"
                break
              fi
              # Print periodic diagnostics every 15s.
              if [ $((i % 3)) = 0 ]; then
                echo "--- poll $i: CSI node new log lines ---"
                kubectl logs "$CSI_NODE_POD" -c csi-seaweedfs-plugin 2>/dev/null | tail -n +"$((LOG_BASELINE + 1))" | tail -20
                echo "--- poll $i: fuse mounts in CSI node ---"
                kubectl exec "$CSI_NODE_POD" -c csi-seaweedfs-plugin -- cat /proc/self/mountinfo 2>/dev/null | grep fuse || echo "(none)"
              fi
              if [ "$i" = "$ATTEMPTS" ]; then
                echo "FAIL: Mount not recovered after $((ATTEMPTS * 5))s"
                echo "--- CSI node full logs (new lines since restart) ---"
                kubectl logs "$CSI_NODE_POD" -c csi-seaweedfs-plugin 2>/dev/null | tail -n +"$((LOG_BASELINE + 1))"
                echo "--- Mount service logs ---"
                kubectl logs -l app=seaweedfs-mount --tail=200
                echo "--- Pod describe ---"
                kubectl describe pod test-pod
                exit 1
              fi
              sleep 5
            done

            # Verify writes still work after recovery.
            kubectl exec test-pod -- sh -c 'echo "after-restart" > /data/post_restart.txt'
            kubectl exec test-pod -- cat /data/post_restart.txt | grep "after-restart"
            echo "PASS: Mount service restart recovery test passed"
          fi

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pod test-pod --ignore-not-found
          kubectl delete pvc test-pvc --ignore-not-found

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== CSI Controller Logs ==="
          kubectl logs -l app=seaweedfs-controller --tail=200 || true
          echo "=== CSI Node Logs ==="
          kubectl logs -l app=seaweedfs-node -c csi-seaweedfs-plugin --tail=500 || true
          echo "=== Mount Service Logs ==="
          kubectl logs -l app=seaweedfs-mount --tail=200 || true
          echo "=== SeaweedFS Logs ==="
          kubectl logs -n seaweedfs -l app=seaweedfs --tail=200 || true
          echo "=== All Pods ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' | tail -50

